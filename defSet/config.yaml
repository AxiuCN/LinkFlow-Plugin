# ==============================================================
# LinkFlow-Plugin v2.0.0 默认配置（开发者维护，用户勿改）
# 变量占位符将被锅巴后台或 generateConfig 替换
# ==============================================================

# ---------- 全局设置 ----------
global:
  # 总开关：关闭后除 #机器人b站登录 / #B站登录 / #B站状态 外所有功能停用
  enabled: ${global_enabled}

# ---------- B站账号登录 ----------
login:
  # 扫码登录轮询超时（秒）
  pollTimeout: ${login_pollTimeout}

# ---------- 链接解析（apps/linkparse.js）----------
linkparse:
  # 解析总开关
  enabled: ${linkparse_enabled}

  # ===== 10平台独立开关 =====
  bilibili:
    enabled: ${linkparse_bilibili_enabled}
  douyin:
    enabled: ${linkparse_douyin_enabled}
  tiktok:
    enabled: ${linkparse_tiktok_enabled}
  kuaishou:
    enabled: ${linkparse_kuaishou_enabled}
  weibo:
    enabled: ${linkparse_weibo_enabled}
  xiaohongshu:
    enabled: ${linkparse_xiaohongshu_enabled}
  xianyu:
    enabled: ${linkparse_xianyu_enabled}
  toutiao:
    enabled: ${linkparse_toutiao_enabled}
  xiaoheihe:
    enabled: ${linkparse_xiaoheihe_enabled}
  twitter:
    enabled: ${linkparse_twitter_enabled}

  # ===== 下载设置 =====
  download:
    # 下载总开关
    enabled: ${linkparse_download_enabled}
    # 单个视频下载超时（秒）
    timeout: ${linkparse_download_timeout}
    # 最大文件大小（MB），超过不下载
    maxSize: ${linkparse_download_maxSize}
    # 群白名单独立管理于 config/linkparse_config/whitelist.yaml
    # 锅巴中编辑，或群内发送 #开启解析 / #关闭解析

# ---------- 订阅推送 ----------
subscribe:

  # ===== 动态订阅 =====
  dynamic:
    # 动态推送总开关
    enabled: ${subscribe_dynamic_enabled}
    # 轮询 cron（秒 分 时 日 月 周），默认每23分钟
    cron: ${subscribe_dynamic_cron}
    # 动态时间窗口（秒），超过此时间的动态不推送
    timeRange: ${subscribe_dynamic_timeRange}

  # ===== 直播订阅 =====
  live:
    # 直播推送总开关
    enabled: ${subscribe_live_enabled}
    # 轮询 cron（秒 分 时 日 月 周），默认每分钟第10秒
    cron: ${subscribe_live_cron}
    # 是否推送下播消息
    endPush: ${subscribe_live_endPush}

  # ===== 推送行为 =====
  push:
    # 是否使用合并转发推送
    forward: ${subscribe_push_forward}
    # 标题变更时是否再次推送
    rePush: ${subscribe_push_rePush}
    # 群间推送间隔（秒），避免多群同时推送风控
    sleep: ${subscribe_push_sleep}

# ---------- B站直播推送（旧版兼容，apps/livepush.js）----------
livePush:
  enabled: ${subscribe_live_enabled}
  cron: ${subscribe_live_cron}
  endPush: ${subscribe_live_endPush}
  forward: ${subscribe_push_forward}
  rePush: ${subscribe_push_rePush}
  sleep: ${subscribe_push_sleep}

# ---------- B站激励计划（apps/incentive.js）----------
incentive:
  # ---------- 全局开关 ----------
  enabled: ${incentive_enabled}

  # ===== 直播激励领取 =====
  # ---------- 直播领取 cron ----------
  liveCron: ${incentive_liveCron}
  # ---------- 全局截止时间（秒），0=不限 ----------
  claimDeadline: ${incentive_claimDeadline}
  # ---------- 直播领取设置 ----------
  claim:
    # 并发领取线程数（同时发送请求的 worker 数量）
    threadCount: ${incentive_claim_threadCount}
    # 单个 worker 最大重试次数
    maxRetry: ${incentive_claim_maxRetry}
    # 重试间隔（秒）
    retryInterval: ${incentive_claim_retryInterval}
    # 单次请求超时（秒）
    timeout: ${incentive_claim_timeout}

  # ===== 看播激励领取 =====
  # ---------- 看播领取 cron ----------
  watchCron: ${incentive_watchCron}
  # ---------- 看播截止时间（秒）----------
  watchDeadline: ${incentive_watchDeadline}
  # ---------- 看播领取设置 ----------
  watch:
    # 并发领取线程数（同时发送请求的 worker 数量）
    threadCount: ${incentive_watch_threadCount}
    # 单个 worker 最大重试次数
    maxRetry: ${incentive_watch_maxRetry}
    # 重试间隔（秒）
    retryInterval: ${incentive_watch_retryInterval}
    # 单次请求超时（秒）
    timeout: ${incentive_watch_timeout}

  # ===== 每日任务激励兜底 =====
  # ---------- 兜底领取 cron ----------
  fallbackCron: ${incentive_fallbackCron}
  # ---------- 每日任务链接（4个，主人配置）----------
  dailyTaskLinks:
    - '${incentive_dailyTaskLink1}'
    - '${incentive_dailyTaskLink2}'
    - '${incentive_dailyTaskLink3}'
    - '${incentive_dailyTaskLink4}'

<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html;charset=utf-8"/>
    <link rel="shortcut icon" href="#"/>
    <link rel="stylesheet" type="text/css" href="{{_res_path}}/common/common.css"/>
    <style>
        body {
            transform: scale(1);
            width: 540px;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 540px !important;
            padding: 30px 0 20px 0 !important;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 16px;
        }
        .qr-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .qr-box .title {
            font-size: 28px;
            font-weight: bold;
            color: #00a1d6;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .qr-box .subtitle {
            font-size: 14px;
            color: #99a2aa;
            margin-bottom: 20px;
        }
        .qr-wrapper {
            background: #fff;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 16px;
        }
        .qr-wrapper table {
            margin: 0 auto;
        }
        .qr-footer {
            text-align: center;
            color: #fb7299;
            font-size: 13px;
            padding: 0 20px;
            line-height: 1.6;
        }
        .qr-footer .hint {
            color: #99a2aa;
            font-size: 12px;
            margin-top: 4px;
        }
        .qq-info {
            text-align: center;
            color: #6b7b8d;
            font-size: 12px;
            margin-top: 12px;
            padding: 6px 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="qr-box">
            <div class="title">B站扫码登录</div>
            <div class="subtitle">Bilibili-Plugin</div>
            <div class="qr-wrapper">
                <script src="{{_res_path}}/qrCode/js/jquery-1.10.2.min.js"></script>
                <script src="{{_res_path}}/qrCode/js/jquery.qrcode.min.js"></script>
                <script>
                var config = {
                    width: 400,
                    height: 400,
                    text: "{{url}}".replace(/&#(?:3[48]|38);/g, ''),
                    correctLevel: 2,
                    render: "table"
                };
                $(".qr-wrapper").qrcode(config);
                </script>
            </div>
            <div class="qr-footer">
                请使用B站客户端扫码登录<br/>
                <span class="hint">二维码有效期为3分钟，超时请重新发送 #B站登录</span>
            </div>
            <div class="qq-info">触发者QQ: {{qq}}</div>
        </div>
    </div>
</body>
</html>
